<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>to do</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Mono', monospace; background: #fff; }

    #app { max-width: 480px; margin: 48px auto; padding: 0 24px; }

    /* Header */
    #header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
    #list-title { font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase; color: #999; font-weight: 400; }

    /* Menu */
    #menu-wrap { position: relative; }
    #menu-btn { background: none; border: none; cursor: pointer; font-size: 18px; color: #bbb; padding: 0 4px; line-height: 1; letter-spacing: 2px; font-family: inherit; transition: color 0.1s; }
    #menu-btn:hover, #menu-btn.open { color: #222; }
    #menu { display: none; position: absolute; right: 0; top: calc(100% + 8px); background: #fff; border: 1px solid #f0f0f0; border-radius: 8px; padding: 12px 0; min-width: 220px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); z-index: 10; }
    #menu.open { display: block; }
    .menu-item { display: flex; align-items: center; padding: 10px 18px; cursor: pointer; }
    .menu-item:hover { background: #f9f9f9; }
    .menu-item.active { background: #f9f9f9; }
    .menu-item-name { flex: 1; font-size: 15px; color: #666; font-family: 'DM Mono', monospace; }
    .menu-item.active .menu-item-name { color: #111; }
    .menu-item-count { font-size: 11px; color: #ccc; margin-right: 8px; }
    .menu-item-delete { background: none; border: none; cursor: pointer; color: #ddd; font-size: 14px; line-height: 1; font-family: inherit; padding: 0; }
    .menu-item-delete:hover { color: #999; }
    #menu-divider { border: none; border-top: 1px solid #f0f0f0; margin: 8px 0 0; }
    #new-list-row { display: flex; gap: 6px; padding: 10px 18px 6px; }
    #new-list-input { flex: 1; border: none; border-bottom: 1px solid #eee; padding: 4px 0; font-size: 12px; outline: none; background: transparent; color: #222; font-family: 'DM Mono', monospace; }
    #new-list-btn { background: none; border: none; cursor: pointer; font-size: 16px; color: #ccc; padding: 0; font-family: inherit; }
    #new-list-btn:hover { color: #222; }

    /* Task input */
    #input-row { display: flex; gap: 8px; margin-bottom: 40px; }
    #task-input { flex: 1; border: none; border-bottom: 1px solid #d0d0d0; padding: 8px 0; font-size: 15px; outline: none; background: transparent; color: #222; font-family: 'DM Mono', monospace; }
    #task-input::placeholder { color: #ccc; }
    #add-btn { background: none; border: none; cursor: pointer; font-size: 20px; color: #bbb; padding: 0 4px; line-height: 1; transition: color 0.1s; font-family: inherit; }
    #add-btn:hover { color: #222; }

    /* Tasks */
    #task-list { list-style: none; }
    .task-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #e8e8e8; transition: opacity 0.4s ease; }
    .task-item.done { opacity: 0.35; }
    .task-item input[type="checkbox"] { accent-color: #111; cursor: pointer; width: 14px; height: 14px; flex-shrink: 0; }
    .task-text { flex: 1; font-size: 15px; color: #111; cursor: pointer; font-family: 'DM Mono', monospace; transition: color 0.15s; }
    .task-item.done .task-text { text-decoration: line-through; color: #aaa; }
    .task-delete { background: none; border: none; cursor: pointer; color: #ddd; font-size: 16px; padding: 0; line-height: 1; transition: color 0.1s; font-family: inherit; }
    .task-delete:hover { color: #999; }

    #footer { font-size: 11px; color: #ccc; margin-top: 24px; letter-spacing: 0.1em; }
    #empty { color: #ccc; font-size: 13px; padding-top: 8px; }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <span id="list-title"></span>
    <div id="menu-wrap">
      <button id="menu-btn">···</button>
      <div id="menu">
        <div id="menu-lists"></div>
        <hr id="menu-divider" />
        <div id="new-list-row">
          <input id="new-list-input" placeholder="new list..." />
          <button id="new-list-btn">+</button>
        </div>
      </div>
    </div>
  </div>

  <div id="input-row">
    <input id="task-input" placeholder="add a task..." />
    <button id="add-btn">+</button>
  </div>

  <ul id="task-list"></ul>
  <p id="footer" style="display:none"></p>
</div>

<script>
  let nextId = Date.now();

  // Load from localStorage
  let lists = JSON.parse(localStorage.getItem('lists') || 'null') || [
    { id: 1, name: 'personal', tasks: [] },
    { id: 2, name: 'work', tasks: [] },
  ];
  let activeId = JSON.parse(localStorage.getItem('activeId') || '1');

  function save() {
    localStorage.setItem('lists', JSON.stringify(lists));
    localStorage.setItem('activeId', JSON.stringify(activeId));
  }

  function activeList() { return lists.find(l => l.id === activeId); }

  function render() {
    const list = activeList();

    // Title
    document.getElementById('list-title').textContent = list.name;

    // Menu list items
    const menuLists = document.getElementById('menu-lists');
    menuLists.innerHTML = '';
    lists.forEach(l => {
      const item = document.createElement('div');
      item.className = 'menu-item' + (l.id === activeId ? ' active' : '');

      const name = document.createElement('span');
      name.className = 'menu-item-name';
      name.textContent = l.name;
      item.appendChild(name);

      const pending = l.tasks.filter(t => !t.done).length;
      if (pending > 0) {
        const count = document.createElement('span');
        count.className = 'menu-item-count';
        count.textContent = pending;
        item.appendChild(count);
      }

      if (lists.length > 1) {
        const del = document.createElement('button');
        del.className = 'menu-item-delete';
        del.textContent = '×';
        del.onclick = (e) => { e.stopPropagation(); deleteList(l.id); };
        item.appendChild(del);
      }

      item.onclick = () => { activeId = l.id; save(); closeMenu(); render(); };
      menuLists.appendChild(item);
    });

    // Tasks
    const ul = document.getElementById('task-list');
    ul.innerHTML = '';

    const sorted = [...list.tasks].sort((a, b) => a.done - b.done);

    if (sorted.length === 0) {
      const li = document.createElement('li');
      li.id = 'empty';
      li.textContent = 'nothing yet.';
      ul.appendChild(li);
    }

    sorted.forEach(t => {
      const li = document.createElement('li');
      li.className = 'task-item' + (t.done ? ' done' : '');

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = t.done;
      cb.onchange = () => toggleTask(t.id);

      const span = document.createElement('span');
      span.className = 'task-text';
      span.textContent = t.text;
      span.onclick = () => toggleTask(t.id);

      const del = document.createElement('button');
      del.className = 'task-delete';
      del.textContent = '×';
      del.onclick = () => removeTask(t.id);

      li.appendChild(cb);
      li.appendChild(span);
      li.appendChild(del);
      ul.appendChild(li);
    });

    // Footer
    const footer = document.getElementById('footer');
    const left = list.tasks.filter(t => !t.done).length;
    if (list.tasks.length > 0) {
      footer.style.display = 'block';
      footer.textContent = left + ' left';
    } else {
      footer.style.display = 'none';
    }
  }

  function addTask() {
    const input = document.getElementById('task-input');
    const text = input.value.trim();
    if (!text) return;
    activeList().tasks.push({ id: nextId++, text, done: false });
    input.value = '';
    save(); render();
  }

  function toggleTask(id) {
    const task = activeList().tasks.find(t => t.id === id);
    if (task) task.done = !task.done;
    save(); render();
  }

  function removeTask(id) {
    const list = activeList();
    list.tasks = list.tasks.filter(t => t.id !== id);
    save(); render();
  }

  function addList() {
    const input = document.getElementById('new-list-input');
    const name = input.value.trim().toLowerCase();
    if (!name) return;
    const newList = { id: nextId++, name, tasks: [] };
    lists.push(newList);
    activeId = newList.id;
    input.value = '';
    save(); closeMenu(); render();
  }

  function deleteList(id) {
    if (lists.length === 1) return;
    lists = lists.filter(l => l.id !== id);
    if (activeId === id) activeId = lists[0].id;
    save(); render();
  }

  function closeMenu() {
    document.getElementById('menu').classList.remove('open');
    document.getElementById('menu-btn').classList.remove('open');
  }

  // Events
  document.getElementById('menu-btn').onclick = () => {
    document.getElementById('menu').classList.toggle('open');
    document.getElementById('menu-btn').classList.toggle('open');
  };

  document.addEventListener('mousedown', (e) => {
    if (!document.getElementById('menu-wrap').contains(e.target)) closeMenu();
  });

  document.getElementById('add-btn').onclick = addTask;
  document.getElementById('task-input').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

  document.getElementById('new-list-btn').onclick = addList;
  document.getElementById('new-list-input').addEventListener('keydown', e => { if (e.key === 'Enter') addList(); });

  render();
</script>
</body>
</html>
